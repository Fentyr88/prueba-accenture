services:
  dynamodb:
    image: amazon/dynamodb-local:latest
    user: root
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /home/dynamodblocal/data"
    ports:
      - "8000:8000"
    volumes:
      - dynamodb_data:/home/dynamodblocal/data

  dynamodb-init:
    image: amazon/aws-cli:2.17.43
    container_name: dynamodb-init
    restart: "no"
    depends_on:
      dynamodb:
        condition: service_started
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: [ "/bin/sh", "-c" ]
    command: >
      "until aws dynamodb list-tables --endpoint-url http://dynamodb:8000 --region us-east-1 > /dev/null 2>&1; do sleep 2; done; 
      aws dynamodb create-table --table-name franchise-table --attribute-definitions AttributeName=PK,AttributeType=S AttributeName=SK,AttributeType=S --key-schema AttributeName=PK,KeyType=HASH AttributeName=SK,KeyType=RANGE --billing-mode PAY_PER_REQUEST --endpoint-url http://dynamodb:8000 --region us-east-1 || echo 'La tabla ya existe'"
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prueba-accenture-app
    depends_on:
      dynamodb-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_REGION: us-east-1
      AWS_DYNAMODB_TABLE_NAME: franchise-table
      AWS_DYNAMODB_ENDPOINT: http://dynamodb:8000

volumes:
  dynamodb_data: