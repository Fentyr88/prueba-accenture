services:
  dynamodb:
    image: amazon/dynamodb-local:latest
    container_name: dynamodb-local
    command: "-jar DynamoDBLocal.jar -inMemory -sharedDb"
    ports:
      - "8000:8000"

  dynamodb-init:
    image: amazon/aws-cli:2.17.43
    container_name: dynamodb-init
    restart: "no"
    depends_on:
      dynamodb:
        condition: service_started
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: us-east-1
      TABLE_NAME: franchise-table
    entrypoint: ["/bin/sh", "-ec"]
    command: |
      echo "Waiting for DynamoDB..."
      until aws dynamodb list-tables \
        --endpoint-url http://dynamodb:8000 \
        --region "$AWS_DEFAULT_REGION" >/dev/null 2>&1; do
        sleep 2
      done

      echo "Ensuring table exists: $TABLE_NAME"
      if aws dynamodb describe-table \
        --table-name "$TABLE_NAME" \
        --endpoint-url http://dynamodb:8000 \
        --region "$AWS_DEFAULT_REGION" >/dev/null 2>&1; then
        echo "Table already exists"
      else
        aws dynamodb create-table \
          --table-name "$TABLE_NAME" \
          --attribute-definitions AttributeName=PK,AttributeType=S AttributeName=SK,AttributeType=S \
          --key-schema AttributeName=PK,KeyType=HASH AttributeName=SK,KeyType=RANGE \
          --billing-mode PAY_PER_REQUEST \
          --endpoint-url http://dynamodb:8000 \
          --region "$AWS_DEFAULT_REGION"
      fi

      aws dynamodb wait table-exists \
        --table-name "$TABLE_NAME" \
        --endpoint-url http://dynamodb:8000 \
        --region "$AWS_DEFAULT_REGION"

      echo "Table ready"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prueba-accenture-app
    depends_on:
      dynamodb-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_REGION: us-east-1
      AWS_DYNAMODB_TABLE_NAME: franchise-table
      AWS_DYNAMODB_ENDPOINT: http://dynamodb:8000
