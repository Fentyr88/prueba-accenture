AWSTemplateFormatVersion: '2010-09-09'
Description: DynamoDB table for Franchise service (sin GSI)

Parameters:
  TableName:
    Type: String
    Default: franchise-table

Resources:
  FranchiseTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      BillingMode: PAY_PER_REQUEST

      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S

      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

      SSESpecification:
        SSEEnabled: true

      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

Outputs:
  TableName:
    Value: !Ref FranchiseTable

  TableArn:
    Value: !GetAtt FranchiseTable.Arn
